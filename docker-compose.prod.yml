version: '3.9'

services:
  backend:
    build:
      context: ./backend
    env_file:
      - .env
    environment:
      APP_ENV: production
      APP_DEBUG: 'false'
      APP_AUTO_CREATE_TABLES: 'false'
    ports:
      - '8000:8000'
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'python -c "import urllib.request; urllib.request.urlopen(''http://127.0.0.1:8000/health/live'')"']
      interval: 30s
      timeout: 5s
      retries: 5

  frontend:
    build:
      context: ./frontend
    env_file:
      - .env
    environment:
      NODE_ENV: production
    ports:
      - '3000:3000'
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://127.0.0.1:3000 || exit 1']
      interval: 30s
      timeout: 5s
      retries: 5

  # Optional local production-like dependencies.
  postgres:
    image: postgres:16
    profiles: ['local']
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: personal_health
    ports:
      - '5432:5432'
    volumes:
      - pg_data:/var/lib/postgresql/data

  minio:
    image: minio/minio:latest
    profiles: ['local']
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

volumes:
  pg_data:
  minio_data:
