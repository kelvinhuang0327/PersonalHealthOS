version: '3.9'

services:
  api-gateway:
    image: kong:3.8
    ports:
      - '8080:8000'
    environment:
      KONG_DATABASE: 'off'
      KONG_DECLARATIVE_CONFIG: /kong/declarative/kong.yml

  rabbitmq:
    image: rabbitmq:3.13-management
    ports:
      - '5672:5672'
      - '15672:15672'

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'

  postgres:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_platform
    ports:
      - '5432:5432'

  minio:
    image: minio/minio:latest
    command: server /data --console-address ':9001'
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - '9000:9000'
      - '9001:9001'

  identity-service:
    image: personal-health/identity-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/identity_db
      REDIS_URL: redis://redis:6379/0

  health-data-service:
    image: personal-health/health-data-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/health_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/1

  family-service:
    image: personal-health/family-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/family_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/

  device-ingestion-service:
    image: personal-health/device-ingestion-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/device_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/

  notification-service:
    image: personal-health/notification-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/notification_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/

  document-service:
    image: personal-health/document-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/document_db
      S3_ENDPOINT_URL: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin

  report-service:
    image: personal-health/report-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/report_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/

  ai-orchestrator-service:
    image: personal-health/ai-orchestrator-service:latest
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ai_db
      MQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY}
