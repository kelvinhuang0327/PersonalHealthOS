version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: health-insights-postgres-local
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: health_insights_dev
    ports:
      - '5432:5432'
    volumes:
      - health_insights_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d health_insights_dev']
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

volumes:
  health_insights_pg_data:
